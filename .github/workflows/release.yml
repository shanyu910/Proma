# GitHub Actions: 自动打包分发
#
# 触发条件：推送 v* tag（如 v0.4.0）
# 构建 macOS 和 Windows 产物并发布到火山引擎 TOS（对象存储）
# 国内用户访问快，不依赖 GitHub Releases
#
# 所需 GitHub Secrets:
# macOS 签名/公证（可选）:
# - MAC_CERTS: Base64 编码的 macOS Developer ID Application 证书 (.p12)
# - MAC_CERTS_PASSWORD: 证书密码
# - APPLE_ID: Apple ID（公证用）
# - APPLE_APP_SPECIFIC_PASSWORD: App-Specific 密码（公证用）
# - APPLE_TEAM_ID: Apple Developer Team ID
# 火山引擎 TOS（必需，用于上传安装包）:
# - TOS_ACCESS_KEY: 火山引擎 AccessKey ID
# - TOS_SECRET_KEY: 火山引擎 AccessKey Secret
# GITHUB_TOKEN 由 GitHub Actions 自动提供（仅用于回填 latest-mac.yml 合并所需的 release 信息，可选）

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac-arm64:
    name: build (macos-latest, mac, arm64, --arm64)
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: bun install --frozen-lockfile

      # 注入生产环境配置（.env 被 gitignore，CI 显式创建）
      - name: 写入生产环境 .env
        run: |
          echo "VITE_LEGIS_SERVER_URL=http://14.103.216.135:31006" > apps/electron/.env
          echo "→ CI 构建使用生产环境地址"

      # macOS 代码签名准备
      - name: 导入 macOS 签名证书
        env:
          MAC_CERTS: ${{ secrets.MAC_CERTS }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        run: |
          # 创建临时 keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 导入证书
          echo "$MAC_CERTS" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$MAC_CERTS_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          rm $RUNNER_TEMP/cert.p12

      # 构建应用
      - name: 构建 Electron 应用
        run: bun run electron:build
        working-directory: .

      # 打包（不上传，上传统一在 upload 步骤）
      - name: 打包 (macOS arm64)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for i in 1 2 3; do
            npx electron-builder --mac --arm64 --publish never && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
        working-directory: apps/electron

      # 上传到火山引擎 TOS
      - name: 上传到 TOS (macOS arm64)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TOS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TOS_SECRET_KEY }}
        run: |
          aws s3 cp apps/electron/dist/ s3://legis/releases/ \
            --endpoint-url https://tos-s3-cn-beijing.volces.com \
            --acl public-read \
            --recursive \
            --exclude "*" \
            --include "*.dmg" \
            --include "*-mac.zip" \
            --include "*.blockmap" \
            --include "latest-mac.yml"

  build-mac-x64:
    name: build (macos-15-intel, mac, x64, --x64)
    runs-on: macos-15-intel

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: bun install --frozen-lockfile

      # 注入生产环境配置（.env 被 gitignore，CI 显式创建）
      - name: 写入生产环境 .env
        run: |
          echo "VITE_LEGIS_SERVER_URL=http://14.103.216.135:31006" > apps/electron/.env
          echo "→ CI 构建使用生产环境地址"

      # macOS 代码签名准备
      - name: 导入 macOS 签名证书
        env:
          MAC_CERTS: ${{ secrets.MAC_CERTS }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        run: |
          # 创建临时 keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 导入证书
          echo "$MAC_CERTS" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$MAC_CERTS_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          rm $RUNNER_TEMP/cert.p12

      # 构建应用
      - name: 构建 Electron 应用
        run: bun run electron:build
        working-directory: .

      # 打包（不上传，上传统一在 upload 步骤）
      - name: 打包 (macOS x64)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for i in 1 2 3; do
            npx electron-builder --mac --x64 --publish never && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
        working-directory: apps/electron

      # 上传到火山引擎 TOS
      - name: 上传到 TOS (macOS x64)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TOS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TOS_SECRET_KEY }}
        run: |
          aws s3 cp apps/electron/dist/ s3://legis/releases/ \
            --endpoint-url https://tos-s3-cn-beijing.volces.com \
            --acl public-read \
            --recursive \
            --exclude "*" \
            --include "*.dmg" \
            --include "*-mac.zip" \
            --include "*.blockmap"

  # 合并 latest-mac.yml：下载两个架构的 zip，计算 sha512，生成统一清单
  merge-mac-yml:
    name: Merge latest-mac.yml (arm64 + x64)
    runs-on: ubuntu-latest
    needs: [build-mac-arm64, build-mac-x64]

    steps:
      - name: 合并两个架构的 latest-mac.yml
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TOS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TOS_SECRET_KEY }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          TOS_ENDPOINT="--endpoint-url https://tos-s3-cn-beijing.volces.com"
          TOS_BUCKET="s3://legis/releases"

          # 列出本次构建的 mac zip 文件
          ARM64_ZIP=$(aws s3 ls $TOS_BUCKET/ $TOS_ENDPOINT | grep "arm64-mac.zip" | awk '{print $4}' | head -1)
          X64_ZIP=$(aws s3 ls $TOS_BUCKET/ $TOS_ENDPOINT | grep -E "[^-]mac\.zip" | awk '{print $4}' | head -1)

          echo "ARM64 ZIP: $ARM64_ZIP"
          echo "X64 ZIP: $X64_ZIP"

          # 下载两个 zip 计算 sha512
          aws s3 cp $TOS_BUCKET/$ARM64_ZIP arm64.zip $TOS_ENDPOINT
          aws s3 cp $TOS_BUCKET/$X64_ZIP x64.zip $TOS_ENDPOINT

          ARM64_SHA=$(openssl dgst -sha512 -binary arm64.zip | base64 -w0)
          ARM64_SIZE=$(stat --format=%s arm64.zip)
          X64_SHA=$(openssl dgst -sha512 -binary x64.zip | base64 -w0)
          X64_SIZE=$(stat --format=%s x64.zip)

          RELEASE_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          # 生成合并后的 latest-mac.yml
          cat > latest-mac.yml <<EOF
          version: ${VERSION}
          files:
            - url: ${ARM64_ZIP}
              sha512: ${ARM64_SHA}
              size: ${ARM64_SIZE}
            - url: ${X64_ZIP}
              sha512: ${X64_SHA}
              size: ${X64_SIZE}
          path: ${ARM64_ZIP}
          sha512: ${ARM64_SHA}
          releaseDate: '${RELEASE_DATE}'
          EOF
          sed -i 's/^          //' latest-mac.yml

          echo "=== Merged latest-mac.yml ==="
          cat latest-mac.yml

          # 上传合并后的 latest-mac.yml（覆盖单架构版本）
          aws s3 cp latest-mac.yml $TOS_BUCKET/latest-mac.yml $TOS_ENDPOINT --acl public-read
          echo "✅ latest-mac.yml merged and uploaded to TOS"

  build-windows-x64:
    name: build (windows-latest, win, x64, --x64)
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: bun install --frozen-lockfile

      # 注入生产环境配置（.env 被 gitignore，CI 显式创建）
      - name: 写入生产环境 .env
        run: |
          echo "VITE_LEGIS_SERVER_URL=http://14.103.216.135:31006" > apps/electron/.env
          echo "→ CI 构建使用生产环境地址"

      # 构建应用
      - name: 构建 Electron 应用
        run: bun run electron:build
        working-directory: .

      - name: 打包 (Windows)
        run: npx electron-builder --win --x64 --publish never
        working-directory: apps/electron

      # 上传到火山引擎 TOS（Windows 上用 aws-cli）
      - name: 上传到 TOS (Windows)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TOS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TOS_SECRET_KEY }}
        run: |
          aws s3 cp apps/electron\dist\ s3://legis/releases/ `
            --endpoint-url https://tos-s3-cn-beijing.volces.com `
            --acl public-read `
            --recursive `
            --exclude "*" `
            --include "*.exe" `
            --include "latest.yml"
        shell: pwsh
