# electron-builder 配置
# 文档: https://www.electron.build/configuration/configuration

appId: com.proma.app
productName: Proma
copyright: Copyright © 2024-2026 Erlich Liu

# Electron 版本（CI 环境 bun workspace 下无法自动检测，需显式指定）
electronVersion: 39.5.1

# 目录配置
directories:
  output: out
  buildResources: resources

# 压缩配置
compression: normal

# ASAR 打包配置
# 启用 ASAR 归档，将 SDK native binary / Pi native addon 解压到 app.asar.unpacked/ 避免路径问题
asar: true
asarUnpack:
  - "node_modules/@anthropic-ai/**"
  - "node_modules/@silvia-odwyer/**"
  - "node_modules/@mariozechner/**"
  - "node_modules/@napi-rs/**"
  - "node_modules/@earendil-works/pi-tui/native/**"

# 跳过 npm install（代码已被 esbuild/Vite 打包，npm 不识别 workspace:* 协议）
npmRebuild: false

# 通用文件配置
files:
  - dist/**/*
  # 排除 build:resources 脚本拷到 dist/resources 的副本（electron-builder 已通过
  # buildResources 从 resources/ 直接使用 icon/plist，避免产物里重复打包一份）
  - "!dist/resources/**"
  - package.json
  # Claude SDK 与 Pi runtime 均作为主进程 external 运行。打包前 sync:runtime-deps 会
  # 将 external 依赖闭包同步到 apps/electron/node_modules。
  - node_modules/**/*
  # 排除 workspace 包的 symlink（代码已被 esbuild/Vite 打包到 dist/ 中）
  - "!node_modules/@proma/**"
  # 排除明确只在开发/构建期使用的大体积包。
  - "!node_modules/electron/**"
  - "!node_modules/electron-builder/**"
  - "!node_modules/electronmon/**"
  - "!node_modules/esbuild/**"
  - "!node_modules/@electron/**"
  - "!node_modules/@electron-builder/**"
  - "!node_modules/@esbuild/**"
  # 排除 Pi SDK 纯演示/文档/sourcemap 内容，保留运行时必需文件。
  - "!node_modules/@earendil-works/*/examples/**"
  - "!node_modules/@earendil-works/*/docs/**"
  - "!node_modules/@earendil-works/**/*.map"

# 通用额外资源
extraResources:
  # proma CLI 自包含二进制（build:cli 用 bun build --compile 产出到 resources/bin/）。
  # 运行时由主进程注入 PROMA_CLI 环境变量，暴露给 skill / Agent 调用。
  - from: resources/bin
    to: bin
    filter:
      - "**/*"
  # 默认 Skills 模板（首次启动时同步到 ~/.proma/default-skills/）
  - from: default-skills
    to: default-skills
    filter:
      - "**/*"
  # 教程文件（教程查看器 + 欢迎对话使用）
  - from: ../../tutorial/tutorial-v2.md
    to: tutorial.md
  # Proma 品牌 Logo 素材（品牌素材下载功能使用）
  - from: resources/proma-logos
    to: proma-logos
    filter:
      - "**/*"
  # 默认 Dock 图标（macOS app.dock.setIcon 使用）
  - from: resources/icon.png
    to: icon.png

# ============================================
# macOS 配置
# ============================================
mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: "Proma 需要访问麦克风，用于将你的语音实时转写为文本。"
  fileAssociations:
    - ext: proma-backup
      name: Proma Personal Backup
      role: Editor
    - ext: proma-share
      name: Proma Share Package
      role: Editor
  # 架构由 CLI 参数控制（CI 矩阵分别传 --arm64 / --x64），
  # 每个 runner 只构建其宿主架构对应的产物，与 bun 按 os/cpu 装好的
  # @anthropic-ai/claude-agent-sdk-darwin-{arch} native binary 对齐。
  target:
    - dmg
    - zip

# DMG 配置
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

# ============================================
# Windows 配置
# ============================================
win:
  icon: resources/icon.ico
  fileAssociations:
    - ext: proma-backup
      name: Proma Personal Backup
      icon: resources/icon.ico
    - ext: proma-share
      name: Proma Share Package
      icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64

# NSIS 安装程序配置
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# ============================================
# 发布配置
# 每个平台的 build job 通过 --publish always 直接上传到 GitHub Release。
# electron-builder 会自动创建/复用 Release，并在多架构并行上传时合并 latest-mac.yml。
# ============================================
publish:
  provider: github
  owner: ErlichLiu
  repo: Proma
