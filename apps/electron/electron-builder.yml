# electron-builder 配置
# 文档: https://www.electron.build/configuration/configuration

appId: com.legis.app
productName: Legis
copyright: Copyright © 2026 Legis

# Electron 版本（CI 环境 bun workspace 下无法自动检测，需显式指定）
electronVersion: 39.5.1

# 目录配置
directories:
  output: out
  buildResources: resources

# 压缩配置
compression: normal

# ASAR 打包配置
# 启用 ASAR 归档，将 SDK native binary 解压到 app.asar.unpacked/ 避免路径问题
asar: true
asarUnpack:
  - "node_modules/@anthropic-ai/**"

# 跳过 npm install（代码已被 esbuild/Vite 打包，npm 不识别 workspace:* 协议）
npmRebuild: false

# 通用文件配置
files:
  - dist/**/*
  # 排除 build:resources 脚本拷到 dist/resources 的副本（electron-builder 已通过
  # buildResources 从 resources/ 直接使用 icon/plist，避免产物里重复打包一份）
  - "!dist/resources/**"
  - package.json
  # 包含 SDK 主包到 app/node_modules/@anthropic-ai/ 目录中（与 dist 和 package.json 同级）
  - node_modules/@anthropic-ai/claude-agent-sdk/**/*
  # 0.2.113+ SDK 改为按平台分发 native binary，通过 optionalDependencies 安装到
  # @anthropic-ai/claude-agent-sdk-{platform}-{arch}/ 子包。
  # 必须将当前 CI 构建矩阵覆盖的平台子包打入安装包，否则运行时找不到 binary。
  # 宿主平台上 os/cpu 不匹配的包会被 bun 跳过安装，打包时 electron-builder 会对不存在的 glob 静默跳过。
  - node_modules/@anthropic-ai/claude-agent-sdk-darwin-arm64/**/*
  - node_modules/@anthropic-ai/claude-agent-sdk-darwin-x64/**/*
  - node_modules/@anthropic-ai/claude-agent-sdk-win32-x64/**/*
  - node_modules/@anthropic-ai/claude-agent-sdk-win32-arm64/**/*
  # PDF 内联预览使用本地 PDF.js 资源，避免运行时依赖 CDN。
  - node_modules/pdfjs-dist/**/*
  # 排除 workspace 包的 symlink（代码已被 esbuild/Vite 打包到 dist/ 中）
  - "!node_modules/@legis/**"

# 通用额外资源
extraResources:
  # legis CLI 自包含二进制（build:cli 用 bun build --compile 产出到 resources/bin/）。
  # 运行时由主进程注入 LEGIS_CLI 环境变量，暴露给 skill / Agent 调用。
  - from: resources/bin
    to: bin
    filter:
      - "**/*"
  # 默认 Skills 模板（首次启动时同步到 ~/.legis/default-skills/）
  - from: default-skills
    to: default-skills
    filter:
      - "**/*"
  # 教程文件（教程查看器 + 欢迎对话使用）
  - from: ../../tutorial/tutorial-v2.md
    to: tutorial.md
  # Legis 品牌 Logo 素材（品牌素材下载功能使用）
  - from: resources/legis-logos
    to: legis-logos
    filter:
      - "**/*"
  # 默认 Dock 图标（macOS app.dock.setIcon 使用）
  - from: resources/icon.png
    to: icon.png

# ============================================
# macOS 配置
# ============================================
mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: "Legis 需要访问麦克风，用于将你的语音实时转写为文本。"
  fileAssociations:
    - ext: legis-backup
      name: Legis Personal Backup
      role: Editor
    - ext: legis-share
      name: Legis Share Package
      role: Editor
  # 架构由 CLI 参数控制（CI 矩阵分别传 --arm64 / --x64），
  # 每个 runner 只构建其宿主架构对应的产物，与 bun 按 os/cpu 装好的
  # @anthropic-ai/claude-agent-sdk-darwin-{arch} native binary 对齐。
  target:
    - dmg
    - zip

# DMG 配置
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

# ============================================
# Windows 配置
# ============================================
win:
  icon: resources/icon.ico
  fileAssociations:
    - ext: legis-backup
      name: Legis Personal Backup
      icon: resources/icon.ico
    - ext: legis-share
      name: Legis Share Package
      icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64

# NSIS 安装程序配置
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# ============================================
# 发布配置
# 发布到火山引擎 TOS（对象存储），国内访问快、不依赖 GitHub。
# electron-builder 构建后用 --publish always 上传到下方 URL。
# CI 通过 aws-cli（S3 兼容）上传，密钥配置在 GitHub Actions Secrets。
# ============================================
publish:
  provider: generic
  url: https://legis.tos-cn-beijing.volces.com/releases/
