<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    Legis 应用图标设计稿
    规范: macOS Big Sur+ 图标规范
      - 画布: 1024x1024
      - 圆角矩形: 824x824 居中 (边距 100px)
      - 圆角: 185px (~22.5%)
    设计:
      - 背景: 深菎青(#1e3a8a) → 深蓝(#0f172a) 双向线性渐变
      - 符号: 饱满白色字母 "L"，顶部右上角 45° 几何切角
  -->

  <defs>
    <linearGradient id="legisBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- macOS 风格圆角背景 -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#legisBlue)"/>

  <!-- 饱满白色 "L" + 顶部右上角 45° 切角 -->
  <path d="M 342 300
           L 446 300
           L 502 356
           L 502 656
           L 712 656
           L 712 712
           L 342 712
           Z"
        fill="#FFFFFF"/>
</svg>
